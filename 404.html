<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dídac Llorens</title>
  <script>
    (() => {
      const marker = "/AgenticCareerBoost/";
      const path = window.location.pathname.replace(/\/index\.html$/, "/");
      const base = path.includes(marker) ? marker : "/";
      const clean = path.slice(base.length).replace(/^\/+|\/+$/g, "");
      const route = clean ? `/${clean}` : "/";
      window.location.replace(`${window.location.origin}${base}site/#${route}`);
    })();
  </script>
</head>
<body></body>
</html>
