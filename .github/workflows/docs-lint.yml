name: Docs lint

on:
  workflow_dispatch:

jobs:
  external-linkcheck:
    name: Check external links (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Run Lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml "**/*.md"
          # Non-blocking: report problems without failing the build.
          # Broken external links produce a warning in the job summary only.
          fail: false
      - name: Upload link-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: lychee/out.md
          if-no-files-found: ignore
