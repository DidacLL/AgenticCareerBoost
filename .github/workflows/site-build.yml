name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-build.yml"
      - "index.html"
      - "404.html"
      - ".nojekyll"
      - "robots.txt"
      - "sitemap.xml"
      - "site/**"
      - "agents/state/**"
      - "agents/tools/export_status.py"
      - "agents/tools/validate_static_site.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and upload root Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate site status data
        run: python agents/tools/export_status.py

      - name: Validate static site
        run: python agents/tools/validate_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
