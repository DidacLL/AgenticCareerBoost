name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-build.yml"
      - "site/**"
      - "application-tracker/**"
      - "agents/cv/**"
      - "agents/reports/tex/**"
      - "agents/state/**"
      - "agents/tools/export_status.py"
      - "agents/tools/validate_static_site.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and upload site Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compile public report PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/reports/tex
          root_file: |
            sprints/*.tex
            guides/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Publish public report PDFs into site artifact
        run: python agents/reports/tex/tools/publish-public-reports.py

      - name: Resolve career artifact build inputs
        id: career
        run: |
          python agents/cv/tools/artifact_manifest.py validate
          {
            echo 'root_files<<EOF'
            python agents/cv/tools/artifact_manifest.py roots
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compile public career PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/cv
          root_file: ${{ steps.career.outputs.root_files }}
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Publish generated career PDFs into site artifact
        run: python agents/cv/tools/artifact_manifest.py publish

      - name: Generate site status data
        run: python agents/tools/export_status.py

      - name: Generate Application Tracker demo
        run: python application-tracker/export_demo_dashboard.py

      - name: Validate static site
        run: python agents/tools/validate_static_site.py

      - name: Ensure Pages marker
        run: touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
