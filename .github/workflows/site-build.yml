name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-build.yml"
      - "site/**"
      - "agents/cv/**"
      - "agents/state/**"
      - "agents/tools/export_status.py"
      - "agents/tools/validate_static_site.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and upload site Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Render public cover-letter sources
        run: python agents/cv/tools/render-cover-letter.py --all

      - name: Compile CV and cover-letter PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/cv
          root_file: |
            tex/didac-llorens-cv.tex
            build/generated/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Publish generated career PDFs into site artifact
        run: |
          mkdir -p site/files/cv site/files/cover-letters
          cp agents/cv/build/didac-llorens-cv.pdf site/files/cv/didac-llorens-cv.pdf
          cp agents/cv/build/*-cover-letter.pdf site/files/cover-letters/

      - name: Generate site status data
        run: python agents/tools/export_status.py

      - name: Validate static site
        run: python agents/tools/validate_static_site.py

      - name: Ensure Pages marker
        run: touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
