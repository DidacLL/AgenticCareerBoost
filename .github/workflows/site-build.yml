name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site-build.yml"
      - "site/**"
      - "content/reports/build/**"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Package Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate site status data
        run: python .github/scripts/export_status.py

      - name: Validate static site
        run: python .github/scripts/validate_static_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger root Pages deployment
        env:
          ROOT_PAGES_DISPATCH_TOKEN: ${{ secrets.ROOT_PAGES_DISPATCH_TOKEN }}
        run: |
          if [ -z "$ROOT_PAGES_DISPATCH_TOKEN" ]; then
            echo "ROOT_PAGES_DISPATCH_TOKEN is not configured; skipping root Pages deploy trigger."
            exit 0
          fi

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $ROOT_PAGES_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/DidacLL/DidacLL.github.io/dispatches \
            -d '{"event_type":"agenticcareerboost-deploy"}'

