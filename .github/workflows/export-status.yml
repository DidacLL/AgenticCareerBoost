name: Check exported status

on:
  pull_request:
    branches: [main]
    paths:
      - "agents/state/**"
      - "agents/tools/export_status.py"
      - ".github/workflows/export-status.yml"
  push:
    branches: [main]
    paths:
      - "agents/state/**"
      - "agents/tools/export_status.py"
      - ".github/workflows/export-status.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Export status JSON
        run: python agents/tools/export_status.py

      - name: Validate generated site status
        run: python -m json.tool site/data/status.json
