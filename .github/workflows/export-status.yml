name: Check exported status

on:
  pull_request:
    branches: [main]
    paths:
      - "state/**"
      - "data/public-status.json"
      - ".github/scripts/export_status.py"
  push:
    branches: [main]
    paths:
      - "state/**"
      - "data/public-status.json"
      - ".github/scripts/export_status.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export status JSON
        run: python .github/scripts/export_status.py

      - name: Check generated status is committed
        run: git diff --exit-code -- data/public-status.json
