name: Build LaTeX reports

on:
  push:
    branches: [main]
    paths:
      - 'content/reports/tex/**'
  pull_request:
    paths:
      - 'content/reports/tex/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/reports/tex
          root_file: sprints/*.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-reports
          path: content/reports/tex/**/*.pdf
          if-no-files-found: error
          retention-days: 30
