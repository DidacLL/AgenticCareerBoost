name: Build LaTeX reports

on:
  push:
    branches: [main]
    paths:
      - "agents/reports/tex/**"
      - ".github/workflows/latex-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/reports/tex
          root_file: |
            smoke.tex
            sprints/*.tex
            guides/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-reports
          path: agents/reports/tex/build/**/*.pdf
          if-no-files-found: error
          retention-days: 30
