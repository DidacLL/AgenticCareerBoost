name: Build LaTeX reports

on:
  push:
    paths:
      - 'content/reports/tex/**'
  pull_request:
    paths:
      - 'content/reports/tex/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/reports/tex
          root_file: sprints/*.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Promote published PDFs into repository
        run: |
          mkdir -p content/reports/build
          find content/reports/tex/build -maxdepth 1 -type f -name '*.pdf' -exec cp {} content/reports/build/ \;

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-reports
          path: content/reports/build/**/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Commit published PDFs
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: publish latest LaTeX PDFs [auto]"
          file_pattern: content/reports/build/*.pdf
