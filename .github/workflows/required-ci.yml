name: required-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: required-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Generate site status data
        run: python agents/tools/export_status.py

      - name: Validate static site
        run: python agents/tools/validate_static_site.py

      - name: Validate internal Markdown links
        run: bash agents/tools/validate_links.sh

      - name: Run targeted tests
        run: python -m pytest agents/tests -q
