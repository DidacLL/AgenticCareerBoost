name: required-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: changed areas
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.filter.outputs.site }}
      tests: ${{ steps.filter.outputs.tests }}
      links: ${{ steps.filter.outputs.links }}
      state: ${{ steps.filter.outputs.state }}
      tex: ${{ steps.filter.outputs.tex }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            {
              echo "site=true"
              echo "tests=true"
              echo "links=true"
              echo "state=true"
              echo "tex=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BASE_SHA" ] || echo "$BASE_SHA" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          echo "$changed"

          flag() {
            name="$1"
            pattern="$2"
            if echo "$changed" | grep -Eq "$pattern"; then
              echo "$name=true" >> "$GITHUB_OUTPUT"
            else
              echo "$name=false" >> "$GITHUB_OUTPUT"
            fi
          }

          flag site '^(site/|\.github/scripts/validate_static_site\.py|\.github/workflows/(required-ci|site-build)\.yml)'
          flag tests '^(tests/|\.github/scripts/|scripts/|\.github/workflows/required-ci\.yml)'
          flag links '^(docs/|site/content/|site/index\.html|README\.md|scripts/validate-links\.sh)'
          flag state '^(state/|data/public-status\.json|site/assets/data/public-status\.json|\.github/scripts/export_status\.py|\.github/workflows/(required-ci|export-status)\.yml)'
          flag tex '^(content/reports/tex/|\.github/workflows/(required-ci|latex-build)\.yml)'

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        run: python -m pytest tests

  internal-links:
    name: internal links
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.links == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Validate internal file references
        run: bash scripts/validate-links.sh

  exported-status:
    name: exported status
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.state == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Export status JSON
        run: python .github/scripts/export_status.py

      - name: Check generated status is committed
        run: git diff --exit-code -- data/public-status.json site/assets/data/public-status.json

  site-build:
    name: static site
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Generate site status data
        run: python .github/scripts/export_status.py

      - name: Validate static site
        run: python .github/scripts/validate_static_site.py

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: required-ci-site
          path: site
          if-no-files-found: error

  latex-build:
    name: LaTeX smoke and reports
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tex == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Compile LaTeX smoke and reports
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/reports/tex
          root_file: |
            smoke.tex
            sprints/*.tex
            guides/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload LaTeX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: required-ci-latex
          path: content/reports/tex/build/**/*.pdf
          if-no-files-found: error
          retention-days: 30

  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    needs:
      - changes
      - pytest
      - internal-links
      - exported-status
      - site-build
      - latex-build
    if: always()
    steps:
      - name: Verify required checks
        run: |
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.pytest.result }}" \
            "${{ needs['internal-links'].result }}" \
            "${{ needs['exported-status'].result }}" \
            "${{ needs['site-build'].result }}" \
            "${{ needs['latex-build'].result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more relevant required CI jobs failed."
              exit 1
            fi
          done
          echo "Relevant required CI jobs passed or were correctly skipped."
