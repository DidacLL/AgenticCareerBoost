name: required-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: required-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Compile public report PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/reports/tex
          root_file: |
            sprints/*.tex
            guides/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Publish public report PDFs into site artifact
        run: python agents/reports/tex/tools/publish-public-reports.py

      - name: Resolve career artifact build inputs
        id: career
        run: |
          python agents/cv/tools/artifact_manifest.py validate
          {
            echo 'root_files<<EOF'
            python agents/cv/tools/artifact_manifest.py roots
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compile public career PDFs
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: agents/cv
          root_file: ${{ steps.career.outputs.root_files }}
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Publish generated career PDFs into site artifact
        run: python agents/cv/tools/artifact_manifest.py publish

      - name: Generate site status data
        run: python agents/tools/export_status.py

      - name: Validate static site
        run: python agents/tools/validate_static_site.py

      - name: Upload PR site artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: site-with-generated-pdfs
          path: site
          if-no-files-found: error
          retention-days: 14

      - name: Validate internal Markdown links
        run: bash agents/tools/validate_links.sh

      - name: Run targeted tests
        run: python -m pytest agents/tests -q
