name: required-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        run: python -m pytest tests

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            #bootstrap/user_data.md
          config: ".markdownlint.jsonc"

  internal-links:
    name: internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate internal file references
        run: bash scripts/validate-links.sh

  exported-status:
    name: exported status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export status JSON
        run: python .github/scripts/export_status.py

      - name: Check generated status is committed
        run: git diff --exit-code -- data/public-status.json

  site-build:
    name: site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: site

      - name: Build Jekyll site
        working-directory: site
        run: bundle exec jekyll build

      - name: Validate built site
        run: test -f site/_site/index.html

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: required-ci-site
          path: site/_site
          if-no-files-found: error

  latex-build:
    name: LaTeX smoke and reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX smoke and reports
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: content/reports/tex
          root_file: |
            smoke.tex
            sprints/*.tex
            guides/*.tex
          args: -r latexmkrc -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload LaTeX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: required-ci-latex
          path: content/reports/tex/build/**/*.pdf
          if-no-files-found: error
          retention-days: 30

  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    needs:
      - pytest
      - markdownlint
      - internal-links
      - exported-status
      - site-build
      - latex-build
    if: always()
    steps:
      - name: Verify required checks
        run: |
          failed=0
          for result in \
            "${{ needs.pytest.result }}" \
            "${{ needs.markdownlint.result }}" \
            "${{ needs['internal-links'].result }}" \
            "${{ needs['exported-status'].result }}" \
            "${{ needs['site-build'].result }}" \
            "${{ needs['latex-build'].result }}"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
