name: System review
description: Audit or improve the agentic system itself.
labels: ["system-review"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rules (docs/core/)
        - Workflows (docs/workflows/)
        - Agents (docs/agents/)
        - Templates (docs/templates/)
        - File structure
        - Token efficiency
        - CI/CD pipelines
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: Symptom or finding
      placeholder: What looks wrong, contradictory, or wasteful?
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed fix
      placeholder: Concrete change or investigation needed.
