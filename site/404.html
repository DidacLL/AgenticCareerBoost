<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dídac Llorens</title>
  <script>
    (() => {
      const projectSiteBase = "/AgenticCareerBoost/site/";
      const path = window.location.pathname.replace(/\/index\.html$/, "/");
      const base = path.startsWith(projectSiteBase) ? projectSiteBase : "/";
      const clean = path.slice(base.length).replace(/^\/+|\/+$/g, "");
      const route = clean ? "/" + clean : "/";
      window.location.replace(window.location.origin + base + "#" + route);
    })();
  </script>
</head>
<body></body>
</html>
