<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #fdfdfd;
      --fg: #222;
      --link: #0366d6;
      --code-bg: #f4f4f4;
      --border: #ddd;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --fg: #e0e0e0;
        --link: #58a6ff;
        --code-bg: #2a2a3e;
        --border: #444;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
    p, ul, ol, table { margin-bottom: 1rem; }
    code {
      background: var(--code-bg);
      padding: 0.15em 0.3em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre { background: var(--code-bg); padding: 1rem; overflow-x: auto; border-radius: 4px; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid var(--border); padding: 0.4rem 0.8rem; text-align: left; }
    th { background: var(--code-bg); }
    nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    nav a { margin-right: 1rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.85em; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/projects/' | relative_url }}">Projects</a>
    <a href="https://github.com/DidacLL/AgenticCareerBoost">Repository</a>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>
      <a href="https://github.com/DidacLL/AgenticCareerBoost">AgenticCareerBoost</a>
      &mdash; built with agentic engineering.
    </p>
  </footer>
</body>
</html>
