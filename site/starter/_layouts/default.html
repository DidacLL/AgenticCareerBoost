<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta property="og:type" content="{{ page.og_type | default: 'profile' }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ page.og_image | default: 'https://raw.githubusercontent.com/DidacLL/AgenticCareerBoost/main/assets/diagrams/routing-architecture.png' }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.og_title | default: page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta name="twitter:image" content="{{ page.og_image | default: 'https://raw.githubusercontent.com/DidacLL/AgenticCareerBoost/main/assets/diagrams/routing-architecture.png' }}">
  <style>
    :root {
      --bg: #f8fafc;
      --fg: #172033;
      --muted: #536175;
      --surface: #ffffff;
      --ink: #0f172a;
      --blue: #1d4ed8;
      --green: #047857;
      --amber: #b45309;
      --border: #d7dee8;
      --code-bg: #eef4fb;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101417;
        --fg: #e5edf6;
        --muted: #a8b5c4;
        --surface: #171d22;
        --ink: #f8fafc;
        --blue: #7dd3fc;
        --green: #86efac;
        --amber: #fbbf24;
        --border: #2d3742;
        --code-bg: #1f2937;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.58;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .site-nav .shell {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
    }
    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.95rem;
    }
    .nav-links a { color: var(--muted); font-weight: 650; }
    .nav-links a.primary-link { color: var(--blue); }
    main { padding-bottom: 56px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 32px;
      align-items: center;
      padding: 54px 0 32px;
    }
    .eyebrow {
      color: var(--green);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0;
      margin-bottom: 12px;
    }
    h1 {
      color: var(--ink);
      font-size: clamp(2.2rem, 6vw, 4.6rem);
      line-height: 0.98;
      letter-spacing: 0;
      margin: 0 0 18px;
      max-width: 11ch;
    }
    h2 {
      color: var(--ink);
      font-size: clamp(1.45rem, 3vw, 2.1rem);
      letter-spacing: 0;
      margin: 0 0 16px;
    }
    h3 {
      color: var(--ink);
      font-size: 1.08rem;
      letter-spacing: 0;
      margin: 0 0 8px;
    }
    p { margin: 0 0 16px; }
    .lead {
      font-size: clamp(1.04rem, 2vw, 1.24rem);
      max-width: 66ch;
      color: var(--muted);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 24px 0 0;
    }
    .button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 14px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 750;
      box-shadow: var(--shadow);
    }
    .button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .visual {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .visual img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: var(--code-bg);
    }
    .caption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
    }
    section {
      padding: 34px 0;
      border-top: 1px solid var(--border);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 28px;
      align-items: start;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 5px;
      background: var(--code-bg);
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 680;
    }
    .metric {
      color: var(--amber);
      font-weight: 850;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: block;
      overflow-x: auto;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--ink); background: var(--code-bg); }
    code {
      background: var(--code-bg);
      padding: 0.12em 0.28em;
      border-radius: 4px;
      font-size: 0.92em;
    }
    footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
      padding: 24px 0 36px;
      font-size: 0.92rem;
    }
    @media (max-width: 820px) {
      .site-nav .shell { align-items: flex-start; flex-direction: column; padding: 12px 0; }
      .hero, .two-col, .grid { grid-template-columns: 1fr; }
      h1 { max-width: 100%; }
      .hero { padding-top: 34px; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="shell">
      <a class="brand" href="{{ '/' | relative_url }}">Dídac Llorens</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Profile</a>
        <a href="{{ '/projects/' | relative_url }}">Projects</a>
        <a href="{{ '/curriculum/' | relative_url }}">Curriculum</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
        <a class="primary-link" href="https://github.com/DidacLL/AgenticCareerBoost">GitHub</a>
        <a class="primary-link" href="https://www.linkedin.com/in/didacllorens/">LinkedIn</a>
      </div>
    </div>
  </nav>
  <main class="shell">
    {{ content }}
  </main>
  <footer>
    <div class="shell">
      <p>Software Engineering · ML/AI · Agentic Systems · Barcelona. Public proof first, claims second.</p>
    </div>
  </footer>
</body>
</html>
